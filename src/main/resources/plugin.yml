name: breadmines
version: '1.0-SNAPSHOT'
main: com.aspectxlol.breadmines.Breadmines
api-version: '1.21'
softdepend: [Skript]

commands:
  drops:
    description: "Manage custom block drops"
    usage: "/drops <create|delete|read> <block_name> [item_id]"
    permission: admin.setup
  dropslist:
    description: "List all registered block drops with pagination"
    usage: "/dropslist [page]"
    permission: admin.setup
  mana:
    description: "Control the Breadmines Skyblock system (enable/disable)"
    usage: "/mana <enable|disable>"
    permission: breadmines.admin
  givesword:
    description: "Give yourself a custom Necron sword"
    usage: "/givesword <hyperion|astraea|valkyrie|scylla|aotv>"
    permission: breadmines.admin
  manaspeed:
    description: "[DEV] Adjust mana regeneration speed"
    usage: "/manaspeed <value>"
    permission: op
  registry:
    description: "Manage the custom item registry"
    usage: "/registry <add|lazyadd|get|remove|delete|list> ..."
    permission: breadmines.registry
    aliases: [itemregistry, itemreg, reg]
  recipe:
    description: "Manage autocompressor recipes"
    usage: "/recipe <create|update|delete|list|info> ..."
    permission: breadmines.recipe
    aliases: [recipes, rcp, rec]

permissions:
  admin.setup:
    description: "Permission to manage custom drops"
    default: op
  breadmines.admin:
    description: "Permission to use Breadmines Skyblock admin commands"
    default: op
  breadmines.registry:
    description: "Permission to manage the custom item registry"
    default: op
  breadmines.recipe:
    description: "Permission to manage autocompressor recipes"
    default: op
